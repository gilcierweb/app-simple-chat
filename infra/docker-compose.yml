version: "3.9"

services:
  # -- PostgreSQL 
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: simplechat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: simplechat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simplechat"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # -- Redis 
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redissecret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redissecret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # -- MinIO (S3-compatible object storage) 
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-miniasecret}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # -- Backend (Rust / Actix) 
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      RUST_LOG: info,simple_chat_backend=debug
      DATABASE_URL: postgres://simplechat:${POSTGRES_PASSWORD:-secret}@postgres:5432/simplechat
      REDIS_URL: redis://:${REDIS_PASSWORD:-redissecret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRY_SECONDS: 900
      JWT_REFRESH_EXPIRY_SECONDS: 2592000
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@simplechat.local}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: simple-chat
      STORAGE_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      STORAGE_SECRET_KEY: ${MINIO_SECRET_KEY:-miniasecret}
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY:?DB_ENCRYPTION_KEY must be set}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal
      - public

  # -- Frontend (Nuxt 4 → nginx) 
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-http://localhost/api}
        NUXT_PUBLIC_WS_URL: ${NUXT_PUBLIC_WS_URL:-ws://localhost/ws}
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - public

  # -- Nginx reverse proxy 
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend
    networks:
      - public

  # -- MailHog (dev email testing) 
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    profiles: ["dev"]
    ports:
      - "8025:8025"   # Web UI
    networks:
      - internal
      - public

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  internal:
    driver: bridge
    internal: true
  public:
    driver: bridge
